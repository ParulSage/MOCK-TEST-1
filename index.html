        opts: ["Erasure of personal data (right to be forgotten) in certain circumstances","Unlimited data portability in all circumstances","Unlimited access to third-party data fiduciaries' systems","Veto over government data processing"],
        ans: 0,
        exp: "The Digital Personal Data Protection Act, 2023 provides data principals with rights including the right to erasure of personal data when the purpose of processing is fulfilled or consent is withdrawn, among other conditions."
      },
      {
        q: "Under the IT Act, 2000, the offence of publishing obscene material in electronic form is covered under:",
        opts: ["Section 65","Section 66C","Section 67","Section 72A"],
        ans: 2,
        exp: "Section 67 IT Act, 2000 makes it an offence to publish or transmit obscene material in electronic form, punishable with imprisonment up to 3 years and fine up to ₹5 lakhs on first conviction."
      },
      {
        q: "'Passing Off' in trade mark law protects:",
        opts: ["Only registered trade marks","Unregistered marks through tort law","Patents that are pending registration","Copyrights in digital form"],
        ans: 1,
        exp: "Passing off is a common law/tort remedy that protects unregistered marks — a trader cannot represent goods or services as being those of another trader, thereby injuring their goodwill."
      },
      {
        q: "Under the RTI Act, 2005, which of the following information is exempt from disclosure under Section 8(1)(j)?",
        opts: ["Information related to corruption allegations","Personal information which has no relationship to any public activity or public interest","Information relating to decisions of public authorities","Statistical data compiled by government agencies"],
        ans: 1,
        exp: "Section 8(1)(j) RTI Act exempts personal information which has no relationship to any public activity or public interest, or which would cause unwarranted invasion of the privacy of the individual."
      },
      {
        q: "The National Cyber Security Policy, 2013 aims to create a secure and resilient cyberspace for:",
        opts: ["Government agencies alone","Citizens, businesses, and the government","Only critical infrastructure sectors","Banking and financial institutions only"],
        ans: 1,
        exp: "The National Cyber Security Policy, 2013 was formulated to build a secure and resilient cyberspace for citizens, businesses, and government, and to protect India from cyber attacks."
      },
      {
        q: "Under the IT Act, 2000, the Cyber Appellate Tribunal has jurisdiction to hear appeals against orders of:",
        opts: ["The Controller of Certifying Authorities only","The Adjudicating Officer or the Controller of Certifying Authorities","The High Court","The Data Protection Authority"],
        ans: 1,
        exp: "The Cyber Appellate Tribunal (now Cyber Regulations Appellate Tribunal) under the IT Act, 2000 hears appeals against orders of Adjudicating Officers and the Controller of Certifying Authorities."
      }
    ]
  }
];

const TOTAL_Q = 100;
const DURATION = 90 * 60;

/* ============================================================
   STATE
   ============================================================ */
let state = {
  phase: "intro", // intro | test | result
  answers: {},     // globalIdx -> optionIdx
  visited: {},     // globalIdx -> true
  timeLeft: DURATION,
  currentSection: 0,
  currentQ: 0,
  timerHandle: null
};

const root = document.getElementById("root");

/* ============================================================
   HELPERS
   ============================================================ */
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, "0");
  const s = (sec % 60).toString().padStart(2, "0");
  return m + ":" + s;
}

function globalIndex(si, qi) { return si * 20 + qi; }

function getQStatus(si, qi) {
  const gi = globalIndex(si, qi);
  if (state.answers[gi] !== undefined) return "answered";
  if (state.visited[gi]) return "visited";
  return "unseen";
}

function computeSectionScores() {
  return SECTIONS.map((s, si) => {
    let c = 0, w = 0, u = 0;
    s.questions.forEach((q, qi) => {
      const gi = globalIndex(si, qi);
      const a = state.answers[gi];
      if (a === undefined) u++;
      else if (a === q.ans) c++;
      else w++;
    });
    return { correct: c, wrong: w, unattempted: u };
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* ============================================================
   TIMER
   ============================================================ */
function startTimer() {
  if (state.timerHandle) clearInterval(state.timerHandle);
  state.timerHandle = setInterval(() => {
    state.timeLeft -= 1;
    if (state.timeLeft <= 0) {
      state.timeLeft = 0;
      clearInterval(state.timerHandle);
      state.timerHandle = null;
      state.phase = "result";
      render();
      return;
    }
    // update only the timer display, to avoid full re-render every second
    const timerEl = document.getElementById("timer-display");
    if (timerEl) {
      timerEl.textContent = "⏱ " + formatTime(state.timeLeft);
      timerEl.className = "timer-box " + timerClass();
    } else {
      clearInterval(state.timerHandle);
      state.timerHandle = null;
    }
  }, 1000);
}

function timerClass() {
  if (state.timeLeft < 300) return "timer-red";
  if (state.timeLeft < 900) return "timer-amber";
  return "timer-green";
}

/* ============================================================
   ACTIONS
   ============================================================ */
function beginTest() {
  state.phase = "test";
  state.visited[globalIndex(0, 0)] = true;
  render();
  startTimer();
}

function selectAnswer(gi, optIdx) {
  state.answers[gi] = optIdx;
  state.visited[gi] = true;
  render();
}

function navigate(si, qi) {
  state.currentSection = si;
  state.currentQ = qi;
  state.visited[globalIndex(si, qi)] = true;
  render();
}

function submitTest() {
  if (state.timerHandle) {
    clearInterval(state.timerHandle);
    state.timerHandle = null;
  }
  state.phase = "result";
  render();
}

function retakeTest() {
  state.phase = "intro";
  state.answers = {};
  state.visited = {};
  state.timeLeft = DURATION;
  state.currentSection = 0;
  state.currentQ = 0;
  if (state.timerHandle) {
    clearInterval(state.timerHandle);
    state.timerHandle = null;
  }
  render();
}

function prevQuestion() {
  const gi = globalIndex(state.currentSection, state.currentQ);
  if (gi === 0) return;
  if (state.currentQ > 0) {
    navigate(state.currentSection, state.currentQ - 1);
  } else {
    navigate(state.currentSection - 1, 19);
  }
}

function nextQuestion() {
  const gi = globalIndex(state.currentSection, state.currentQ);
  if (gi >= TOTAL_Q - 1) return;
  if (state.currentQ < 19) {
    navigate(state.currentSection, state.currentQ + 1);
  } else {
    navigate(state.currentSection + 1, 0);
  }
}

/* ============================================================
   RENDER: INTRO
   ============================================================ */
function renderIntro() {
  const sectionsHtml = SECTIONS.map(s => `
    <div class="intro-section-row" style="color:${s.color}">
      <span class="name">Section ${s.id} — ${escapeHtml(s.short)}</span>
      <span class="count">20 MCQs × 1 Mark</span>
    </div>
  `).join("");

  root.innerHTML = `
    <div class="intro-wrap">
      <div class="intro-card">
        <div class="intro-head">
          <div class="intro-eyebrow">Panjab University</div>
          <h1 class="intro-title">PU CET (PG) LLM</h1>
          <div class="intro-sub">Full Mock Test — 2026/2027</div>
        </div>

        <div class="intro-panel">
          <div class="intro-stats">
            <div class="intro-stat"><div class="val">100</div><div class="label">Questions</div></div>
            <div class="intro-stat"><div class="val">90 min</div><div class="label">Duration</div></div>
            <div class="intro-stat"><div class="val">100</div><div class="label">Total Marks</div></div>
          </div>
          <div class="intro-sections">${sectionsHtml}</div>
        </div>

        <div class="intro-instructions">
          <strong>📋 Instructions:</strong> Each question carries 1 mark. No negative marking. Questions are modelled on PYQ difficulty level. Timer starts as soon as you begin. Submit before time runs out.
        </div>

        <button class="btn-primary" id="begin-btn">▶ Begin Mock Test</button>
      </div>
    </div>
  `;

  document.getElementById("begin-btn").addEventListener("click", beginTest);
}

/* ============================================================
   RENDER: TEST
   ============================================================ */
function renderTest() {
  const si = state.currentSection;
  const qi = state.currentQ;
  const section = SECTIONS[si];
  const q = section.questions[qi];
  const gi = globalIndex(si, qi);
  const sectionScores = computeSectionScores();

  // Section tabs
  const sectionTabsHtml = SECTIONS.map((s, idx) => {
    const ss = sectionScores[idx];
    const active = idx === si;
    return `
      <button class="section-btn" data-section="${idx}"
        style="color:${s.color}; background:${active ? s.bg : "transparent"}; border:1px solid ${active ? s.color : "transparent"}; font-weight:${active ? 700 : 500};">
        <div>${s.id}. ${escapeHtml(s.short)}</div>
        <div class="sec-stats">✅${ss.correct} ❌${ss.wrong} ⬜${ss.unattempted}</div>
      </button>
    `;
  }).join("");

  // Question palette for current section
  const paletteHtml = section.questions.map((_, idx) => {
    const status = getQStatus(si, idx);
    const isActive = idx === qi;
    let bg = "#e2e8f0", color = "#1e293b", border = "1px solid transparent";
    if (isActive) { bg = "#0f1b3c"; color = "white"; border = "2px solid #0f1b3c"; }
    else if (status === "answered") { bg = section.color; color = "white"; }
    else if (status === "visited") { bg = "#fde68a"; color = "#1e293b"; }
    return `<button class="qbtn" data-section="${si}" data-q="${idx}" style="background:${bg}; color:${color}; border:${border};">${globalIndex(si, idx) + 1}</button>`;
  }).join("");

  // Options
  const optionsHtml = q.opts.map((opt, oi) => {
    const selected = state.answers[gi] === oi;
    return `
      <button class="option-btn ${selected ? "selected" : ""}" data-opt="${oi}"
        style="background:${selected ? section.bg : "#f8f9fc"}; border:${selected ? "2px solid " + section.color : "1px solid #e2e8f0"}; color:${selected ? section.color : "#374151"};">
        <span class="opt-letter ${selected ? "selected" : ""}" style="background:${selected ? section.color : "#e2e8f0"};">${String.fromCharCode(65 + oi)}</span>
        <span class="opt-text">${escapeHtml(opt)}</span>
      </button>
    `;
  }).join("");

  const answeredCount = Object.keys(state.answers).length;
  const isFirst = gi === 0;
  const isLast = gi === TOTAL_Q - 1;

  root.innerHTML = `
    <div class="test-wrap">
      <div class="test-header">
        <div class="title">PU CET LLM Mock Test 2026</div>
        <div id="timer-display" class="timer-box ${timerClass()}">⏱ ${formatTime(state.timeLeft)}</div>
        <button class="btn-submit-top" id="submit-top-btn">Submit</button>
      </div>

      <div class="test-body">
        <div class="sidebar">
          <div class="panel">
            <div class="panel-title">SECTIONS</div>
            ${sectionTabsHtml}
          </div>
          <div class="panel">
            <div class="panel-title">QUESTIONS</div>
            <div class="qgrid">${paletteHtml}</div>
            <div class="legend">
              <span class="legend-swatch" style="background:${section.color};"></span>Answered &nbsp;
              <span class="legend-swatch" style="background:#fde68a;"></span>Visited
            </div>
          </div>
        </div>

        <div class="question-area">
          <div class="question-card">
            <div class="section-tag" style="background:${section.bg}; border:1px solid ${section.color}50; color:${section.color};">
              <span>Section ${section.id} — ${escapeHtml(section.short)}</span>
              <span class="count">Q ${gi + 1} of 100</span>
            </div>
            <div class="question-text">
              <span class="qnum" style="color:${section.color};">Q${gi + 1}.</span>${escapeHtml(q.q)}
            </div>
            <div class="options">${optionsHtml}</div>
          </div>

          <div class="nav-row">
            <button class="nav-btn" id="prev-btn" ${isFirst ? "disabled" : ""}>← Previous</button>
            <div class="nav-status">${answeredCount}/100 answered</div>
            ${isLast
              ? `<button class="nav-btn submit" id="submit-bottom-btn">Submit Test</button>`
              : `<button class="nav-btn next" id="next-btn">Next →</button>`
            }
          </div>
        </div>
      </div>
    </div>
  `;

  // Listeners
  document.getElementById("submit-top-btn").addEventListener("click", submitTest);
  const submitBottom = document.getElementById("submit-bottom-btn");
  if (submitBottom) submitBottom.addEventListener("click", submitTest);

  document.getElementById("prev-btn").addEventListener("click", prevQuestion);
  const nextBtn = document.getElementById("next-btn");
  if (nextBtn) nextBtn.addEventListener("click", nextQuestion);

  document.querySelectorAll(".section-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const idx = parseInt(btn.getAttribute("data-section"), 10);
      navigate(idx, 0);
    });
  });

  document.querySelectorAll(".qbtn").forEach(btn => {
    btn.addEventListener("click", () => {
      const s = parseInt(btn.getAttribute("data-section"), 10);
      const q2 = parseInt(btn.getAttribute("data-q"), 10);
      navigate(s, q2);
    });
  });

  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const oi = parseInt(btn.getAttribute("data-opt"), 10);
      selectAnswer(gi, oi);
    });
  });
}

/* ============================================================
   RENDER: RESULT
   ============================================================ */
function renderResult() {
  const allQuestions = [];
  SECTIONS.forEach((s, si) => {
    s.questions.forEach((q, qi) => {
      allQuestions.push({ ...q, sectionIdx: si, questionIdx: qi, globalIdx: globalIndex(si, qi) });
    });
  });

  const attempted = Object.keys(state.answers).length;
  const correct = allQuestions.filter(q => state.answers[q.globalIdx] === q.ans).length;
  const wrong = attempted - correct;
  const unattempted = TOTAL_Q - attempted;
  const percentage = ((correct / TOTAL_Q) * 100).toFixed(1);

  const sectionScores = computeSectionScores();

  const grade = correct >= 75 ? "Excellent" : correct >= 60 ? "Good" : correct >= 45 ? "Average" : "Needs Improvement";
  const gradeColor = correct >= 75 ? "#2C5F2E" : correct >= 60 ? "#B8860B" : correct >= 45 ? "#d97706" : "#8B1A1A";

  // Summary cards
  const summaryHtml = `
    <div class="summary-card" style="background:#f0fff4; border:1px solid #2C5F2E30;">
      <div class="val" style="color:#2C5F2E;">${correct}</div><div class="label">✅ Correct</div>
    </div>
    <div class="summary-card" style="background:#fff5f5; border:1px solid #8B1A1A30;">
      <div class="val" style="color:#8B1A1A;">${wrong}</div><div class="label">❌ Wrong</div>
    </div>
    <div class="summary-card" style="background:#f8f9fc; border:1px solid #64748b30;">
      <div class="val" style="color:#64748b;">${unattempted}</div><div class="label">⬜ Skipped</div>
    </div>
  `;

  // Section-wise performance
  const sectionWiseHtml = SECTIONS.map((s, si) => {
    const ss = sectionScores[si];
    const pct = (ss.correct / 20) * 100;
    return `
      <div class="sw-row">
        <div class="sw-head">
          <span class="name" style="color:${s.color};">Section ${s.id} — ${escapeHtml(s.short)}</span>
          <span class="score">${ss.correct}/20</span>
        </div>
        <div class="sw-bar-bg"><div class="sw-bar-fill" style="background:${s.color}; width:${pct}%;"></div></div>
        <div class="sw-detail">✅ ${ss.correct} &nbsp; ❌ ${ss.wrong} &nbsp; ⬜ ${ss.unattempted}</div>
      </div>
    `;
  }).join("");

  // Detailed solutions per section
  const solutionsHtml = SECTIONS.map((s, si) => {
    const qsHtml = s.questions.map((q, qi) => {
      const gi = globalIndex(si, qi);
      const ua = state.answers[gi];
      const isCorrect = ua === q.ans;
      const isWrong = ua !== undefined && ua !== q.ans;
      const isSkipped = ua === undefined;

      const optsHtml = q.opts.map((opt, oi) => {
        const isCorrOpt = oi === q.ans;
        const isUserOpt = oi === ua;
        let cls = "sol-opt";
        if (isCorrOpt) cls += " correct-opt";
        if (isUserOpt && !isCorrOpt) cls += " user-wrong-opt";
        let marks = "";
        if (isCorrOpt) marks += " ✅";
        if (isUserOpt && !isCorrOpt) marks += " ❌";
        return `<div class="${cls}">${String.fromCharCode(65 + oi)}. ${escapeHtml(opt)}${marks}</div>`;
      }).join("");

      const cardCls = isCorrect ? "sol-card correct" : isWrong ? "sol-card wrong" : "sol-card";

      return `
        <div class="${cardCls}">
          <div class="sol-q">
            <div class="qno">Q${gi + 1}</div>
            <div class="qtext">${escapeHtml(q.q)}</div>
          </div>
          <div class="sol-body">
            ${optsHtml}
            <div class="sol-explanation"><strong>Explanation:</strong> ${escapeHtml(q.exp)}</div>
            ${isSkipped ? `<div class="sol-skipped">⬜ Not attempted</div>` : ""}
          </div>
        </div>
      `;
    }).join("");

    return `
      <div>
        <div class="sol-section-tag" style="background:${s.bg}; border-color:${s.color};">
          <span class="name" style="color:${s.color};">Section ${s.id} — ${escapeHtml(s.title)}</span>
        </div>
        ${qsHtml}
      </div>
    `;
  }).join("");

  root.innerHTML = `
    <div class="result-wrap">
      <div class="result-inner">
        <div class="result-hero">
          <div class="result-eyebrow">PU CET (PG) LLM MOCK TEST</div>
          <h1 class="result-title">Your Result</h1>
          <div class="result-score">${correct}<span class="out-of">/100</span></div>
          <div class="result-pct">${percentage}%</div>
          <div class="result-grade" style="background:${gradeColor};">${grade}</div>
        </div>

        <div class="result-summary">${summaryHtml}</div>

        <div class="result-section">
          <h2>Section-wise Performance</h2>
          ${sectionWiseHtml}
        </div>

        <div class="result-section">
          <h2>Detailed Solutions</h2>
          ${solutionsHtml}
        </div>

        <button class="btn-retake" id="retake-btn">🔄 Retake Test</button>
      </div>
    </div>
  `;

  document.getElementById("retake-btn").addEventListener("click", retakeTest);
}

/* ============================================================
   MAIN RENDER DISPATCH
   ============================================================ */
function render() {
  if (state.phase === "intro") renderIntro();
  else if (state.phase === "test") renderTest();
  else if (state.phase === "result") renderResult();
}

render();
</script>
</body>
</html>
